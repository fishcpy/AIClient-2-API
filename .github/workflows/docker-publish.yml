name: 构建并发布 Docker 镜像

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'  # 仅当 VERSION 文件变更时触发
  workflow_dispatch:  # 允许手动触发
    inputs:
      arm64_arch:
        description: 'ARM64 架构构建模式'
        required: true
        default: 'native'
        type: choice
        options:
          - native
          - emulated

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/aiclient-2-api
  ARM64_ARCH: ${{ github.event.inputs.arm64_arch || 'native' }}

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来创建 tag
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便创建 tag

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "读取到版本号：$VERSION"

      - name: 检查 tag 是否已存在
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} 已存在"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} 不存在，将创建新 tag"
          fi

      - name: 创建 Git Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          echo "已创建并推送 tag: v${{ steps.version.outputs.version }}"

  build-and-push:
    needs: create-tag
    runs-on: ${{ matrix.runs-on }}
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            platform: linux/amd64
          - runs-on: ${{ env.ARM64_ARCH == 'native' && 'ubuntu-latest-arm64' || 'ubuntu-latest' }}
            platform: linux/arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  finalize:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n\r ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 生成最终构建摘要
        run: |
          echo "## Docker 镜像构建成功 :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**版本号:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建平台:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "**ARM64 构建模式:** ${{ env.ARM64_ARCH }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像标签:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY